<body>

<h2>🛒 Product Cart (Basic JS Project)</h2>

<div class="container">
  <div class="products">
    <h3>Products</h3>

    <div class="product">
      <span>Shirt - ₹500</span>
      <button onclick="addToCart('Shirt', 500)">Add</button>
    </div>

    <div class="product">
      <span>Jeans - ₹1000</span>
      <button onclick="addToCart('Jeans', 1000)">Add</button>
    </div>

    <div class="product">
      <span>Shoes - ₹1500</span>
      <button onclick="addToCart('Shoes', 1500)">Add</button>
    </div>
  </div>

  <div class="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <hr>
    <h4>Total: ₹<span id="total">0</span></h4>
  </div>
</div>

<script>
  let cart = [];
  let total = 0;

  function addToCart(name, price) {
    cart.push({ name, price });
    total += price;
    renderCart();
  }

  function renderCart() {
    const cartItems = document.getElementById("cartItems");
    cartItems.innerHTML = "";

    cart.forEach(item => {
      const div = document.createElement("div");
      div.className = "cart-item";
      div.innerHTML = `<span>${item.name}</span><span>₹${item.price}</span>`;
      cartItems.appendChild(div);
    });

    document.getElementById("total").innerText = total;
  }
</script>

</body>
