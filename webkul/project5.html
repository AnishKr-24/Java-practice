<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theme Toggle</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      transition: 0.3s;
      background: white;
      color: black;
      text-align: center;
      padding-top: 100px;
    }

    .dark {
      background: #121212;
      color: white;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
      font-size: 16px;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<h2>Theme Toggle Project</h2>
<p>Click button to switch theme</p>
<button onclick="toggleTheme()">Toggle Theme</button>
<script>
  function toggleTheme() {
    document.body.classList.toggle("dark");
  }
</script>
</body>
</html>
